version: '3.8'

services:
  openclaw:
    build: .
    container_name: openclaw
    restart: always
    ports:
      - "8686:8686"
    volumes:
      # Mount your workspace directory
      - ./workspace:/workspace/clawd
      # Persist openclaw data
      - openclaw-data:/root/.openclaw
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
      - WORKSPACE_DIR=/workspace/clawd
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18789"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  openclaw-data:
